version: "3.9"

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - vaultspark-football-gm-play
      - vaultspark-football-gm-api

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: studio_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  vaultspark-football-gm-play:
    image: ghcr.io/vaultsparkstudios/vaultspark-football-gm-play:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DOMAIN: vaultsparkstudios.com
      GAME_SLUG: vaultspark-football-gm
      GAME_PUBLIC_ORIGIN: https://vaultsparkstudios.com/vaultspark-football-gm/
      GAME_SERVICE_ORIGIN: https://play-vaultspark-football-gm.vaultsparkstudios.com
      API_ORIGIN: https://api-vaultspark-football-gm.vaultsparkstudios.com
      DATABASE_URL: postgresql://studio_admin:${POSTGRES_PASSWORD}@postgres:5432/vaultspark_football_gm_db
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  vaultspark-football-gm-api:
    image: ghcr.io/vaultsparkstudios/vaultspark-football-gm-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8081
      DOMAIN: vaultsparkstudios.com
      GAME_SLUG: vaultspark-football-gm
      APP_ORIGIN: https://vaultsparkstudios.com/vaultspark-football-gm/
      GAME_SERVICE_ORIGIN: https://play-vaultspark-football-gm.vaultsparkstudios.com
      API_ORIGIN: https://api-vaultspark-football-gm.vaultsparkstudios.com
      DATABASE_URL: postgresql://studio_admin:${POSTGRES_PASSWORD}@postgres:5432/vaultspark_football_gm_db
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
